services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  model-server:
    build:
      context: ./services/model-server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
      - MODEL_NAME=tencent/Hunyuan3D-2
      - OUTPUT_DIR=/tmp/hunyuan3d_outputs
      - SHAP_E_STEPS=32
      - SHAP_E_GUIDANCE_SCALE=3.0
    volumes:
      - model-cache:/root/.cache
      - model-outputs:/tmp/hunyuan3d_outputs
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  redis-data:
  model-cache:
  model-outputs:
